name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Check lockfile is up to date
        run: uv lock --check
      - name: Install the project
        run: uv sync
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy
      - name: Dead code detection
        run: uv run vulture src tests
      - name: YAML lint
        run: uv run yamllint harmonic-custom/config.yml .github
      - name: Dependency vulnerability scan
        run: uv run pip-audit
      - name: Test with coverage
        run: |
          uv run pytest --cov=opensmartrouting --cov-report=term-missing --cov-report=html | tee coverage-output.txt
          {
            echo "## Coverage report"
            echo '```'
            cat coverage-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html-report
          path: htmlcov/

  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
